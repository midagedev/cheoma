<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>joseon · 계절 (seasons)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #cfd8e0; }
  #app { width: 100%; height: 100%; }
  #ui {
    position: fixed; left: 12px; top: 12px; z-index: 10; display: flex; gap: 6px;
    font: 13px/1 -apple-system, 'Apple SD Gothic Neo', sans-serif;
  }
  #ui button {
    padding: 7px 12px; border: 0; border-radius: 6px; cursor: pointer;
    background: rgba(20,24,28,.62); color: #fff; backdrop-filter: blur(3px);
  }
  #ui button.on { background: #c8452c; }
  #badge {
    position: fixed; left: 12px; bottom: 10px; z-index: 10;
    font: 12px/1.4 -apple-system, 'Apple SD Gothic Neo', sans-serif;
    color: rgba(31,27,24,.55); pointer-events: none; user-select: none;
  }
  .shot #ui, .shot #badge { display: none !important; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app"></div>
<div id="ui">
  <button data-season="spring">봄 벚꽃</button>
  <button data-season="summer">여름 신록</button>
  <button data-season="autumn">가을 단풍</button>
  <button data-season="winter">겨울 설경</button>
</div>
<div id="badge">joseon · 계절 프로토타입 (spring / summer / autumn / winter)</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PRESETS, computeLayout } from './src/params.js';
import { buildBuilding } from './src/builder/index.js';
import { setupEnvironment } from './src/env/index.js';

const q = new URLSearchParams(location.search);
const SHOT = q.get('shot') === '1';
const angle = q.get('angle') || 'three-quarter';
const timeOfDay = q.get('time') || 'day';
const season0 = ['spring', 'summer', 'autumn', 'winter'].includes(q.get('season')) ? q.get('season') : 'autumn';
if (SHOT) document.body.classList.add('shot');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcfd8e0);
scene.fog = new THREE.Fog(0xcfd8e0, 60, 220);

const sun = new THREE.DirectionalLight(0xfff0dd, 2.6);
sun.position.set(30, 42, 26);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.left = -22; sun.shadow.camera.right = 22;
sun.shadow.camera.top = 22; sun.shadow.camera.bottom = -22;
sun.shadow.bias = -0.0001; sun.shadow.normalBias = 0.05;
scene.add(sun);
const hemi = new THREE.HemisphereLight(0xbdd0e4, 0x8a7a63, 0.9);
scene.add(hemi);

// 건물 (korea 프리셋)
const P = { ...PRESETS.korea };
const building = buildBuilding(P);
scene.add(building);

// 환경 (산수화 레이어 ON)
const layout = computeLayout(P);
const env = setupEnvironment(scene, { sun, hemi, renderer, layout });
env.setTime(timeOfDay);
env.setEnabled(true);

// 카메라 (index.html 과 동일 앵글)
const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 500);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI / 2 - 0.02;
function setAngle(name) {
  const L = computeLayout(P);
  const maxDim = Math.max(L.W + 4, L.D + 4, L.totalH);
  const target = new THREE.Vector3(0, L.totalH * 0.42, 0);
  const spots = {
    'front':          { az: 0,   el: 7,  r: 2.3 },
    'three-quarter':  { az: 38,  el: 13, r: 2.4 },
    'side':           { az: 90,  el: 8,  r: 2.3 },
  };
  const s = spots[name] || spots['three-quarter'];
  const az = (s.az * Math.PI) / 180, el = (s.el * Math.PI) / 180;
  const r = s.r * maxDim;
  camera.position.set(
    target.x + r * Math.cos(el) * Math.sin(az),
    target.y + r * Math.sin(el),
    target.z + r * Math.cos(el) * Math.cos(az)
  );
  controls.target.copy(target);
  controls.update();
}
setAngle(angle);

// 초기 계절
env.setSeason(season0, { immediate: SHOT });
function syncButtons(name) {
  for (const b of document.querySelectorAll('#ui button')) b.classList.toggle('on', b.dataset.season === name);
}
syncButtons(season0);
for (const b of document.querySelectorAll('#ui button')) {
  b.addEventListener('click', () => { env.setSeason(b.dataset.season); syncButtons(b.dataset.season); });
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

let frames = 0;
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  controls.update();
  env.update(dt);
  renderer.render(scene, camera);
  frames++;
  // 파티클이 수관에서 퍼진 뒤 캡처 신호 (shot 모드)
  if (frames === 90) window.__SHOT_READY = true;
});
</script>
</body>
</html>
