<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;height:100%;background:#c9d3dc;overflow:hidden}#c{display:block}</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
// critic 전용 격리 하네스(cg3): env/weather/main 없이 buildBuilding 만 렌더.
// 정밀 앵글(굴뚝·기단·타이트 지붕·접합부·역광)을 URL 로 지정. 판정용 독립 캡처.
import * as THREE from 'three';
import { buildBuilding } from '../src/builder/index.js';
import { PRESETS, computeLayout } from '../src/params.js';

const q = new URLSearchParams(location.search);
const presetKey = q.get('preset') || 'giwa';
const angle = q.get('angle') || 'three-quarter';

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(1280, 800);
renderer.setPixelRatio(1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
// ?bg=마젠타 → 관통(하늘 공극) 탐지용 형광 배경. 지면도 같은 색으로 두면 지붕 뒤 모든 관통이 마젠타로 보인다.
const BG = q.get('bg') ? new THREE.Color(parseInt(q.get('bg'), 16)) : new THREE.Color(0xc9d3dc);
scene.background = BG;

const hemi = new THREE.HemisphereLight(0xdfe7ee, 0xb9ad97, 1.05);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff3e0, 2.1);
// ?sun=back → 정면(+z) 뒤에서 비춰 정면 기둥을 역광으로(백골 숯색 검증용)
sun.position.copy(q.get('sun') === 'back' ? new THREE.Vector3(4, 9, -10) : new THREE.Vector3(-6, 10, 8));
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const d = 14;
sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 60;
sun.shadow.bias = -0.0004;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

const P = { ...PRESETS[presetKey] };
const building = buildBuilding(P);
scene.add(building);

const L = computeLayout(P);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: q.get('bg') ? BG : new THREE.Color(0xb6a892), roughness: 1 }));
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const camera = new THREE.PerspectiveCamera(28, 1280 / 800, 0.1, 500);
const maxDim = Math.max(L.W + 4, L.D + 4, L.totalH);
// 기본 타깃(건물 중심 상단). 앵글별로 tx/ty/tz 로 이동.
const spots = {
  'front':          { az: 0,   el: 7,  r: 2.9 },
  'three-quarter':  { az: 38,  el: 13, r: 3.0 },
  'side':           { az: 90,  el: 8,  r: 2.9 },
  'roof':           { az: 42,  el: 36, r: 2.9 },
  'closeup':        { az: 42,  el: -12, r: 0.76, ty: L.plateY + 0.8 },
  // 타이트 지붕면(수키와 롤 근접) — 지붕 상단을 위에서 근접
  'roof-tight':     { az: 28,  el: 40, r: 1.25, ty: L.ridgeY * 0.92 },
  // ㄱ자 용마루 접합/회첨 근접(안마당 쪽에서 접합부 올려다봄)
  'junction':       { az: 20,  el: 20, r: 1.1,  ty: L.totalH * 0.72 },
  // 원래 삼각 공극이 보이던 각
  'gapcheck':       { az: 42,  el: -4, r: 0.92, ty: L.totalH * 0.82 },
  // 처마 밑 서까래·부연 언더뷰(정면 근접, 올려다봄)
  'eave-under':     { az: 12,  el: -16, r: 0.62, ty: L.eaveInnerY - 0.2 },
  // 굴뚝 근접(우측 후면). 타깃을 굴뚝 위치로 이동.
  'chimney':        { az: 118, el: 10, r: 0.95, tx: 4.6, ty: 1.4, tz: -1.1 },
  // 기단 장대석 줄눈(저각 정면 근접, 저면부)
  'gidan':          { az: 10,  el: -4, r: 1.15, ty: 0.28 },
  // 합각(팔작 박공) — 측면 상단
  'gable':          { az: 66,  el: 20, r: 1.7,  ty: L.ridgeY * 0.8 },
};
const s = { ...(spots[angle] || spots['three-quarter']) };
// URL 오버라이드
for (const k of ['az', 'el', 'r', 'tx', 'ty', 'tz']) {
  if (q.has(k)) s[k] = parseFloat(q.get(k));
}
const target = new THREE.Vector3(s.tx ?? 0, s.ty ?? L.totalH * 0.42, s.tz ?? 0);
const az = (s.az * Math.PI) / 180, el = (s.el * Math.PI) / 180;
const r = s.r * maxDim;
camera.position.set(
  target.x + r * Math.cos(el) * Math.sin(az),
  target.y + r * Math.sin(el),
  target.z + r * Math.cos(el) * Math.cos(az));
camera.lookAt(target);

renderer.render(scene, camera);
requestAnimationFrame(() => { renderer.render(scene, camera); window.__SHOT_READY = true; });
</script>
</body>
</html>
